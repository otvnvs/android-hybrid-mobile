name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Added permissions required to create releases and upload assets
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make Gradle executable
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assemble

    # This step only executes if the commit message is exactly "release"
    - name: Create GitHub Release
      if: github.event.head_commit.message == 'release'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v-${{ github.run_number }}"
        name: "Release #${{ github.run_number }}"
        body: "Automated hybrid app build from commit message triggers."
        files: app/build/outputs/apk/**/*.apk

