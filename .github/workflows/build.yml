name: Build Android APK

# Trigger immediately on push events to the main branch
on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Quickly check out code
    - name: Checkout source code
      uses: actions/checkout@v4

    # 2. Extract the actual commit message header reliably
    - name: Check Commit Message
      id: check_msg
      run: |
        COMMIT_MSG=$(git log -1 --pretty=%s)
        echo "Extracted Message: $COMMIT_MSG"
        if [ "$COMMIT_MSG" != "release" ]; then
          echo "Message does not match 'release'. Skipping build execution."
          exit 0
        fi
        echo "match=true" >> $GITHUB_OUTPUT

    # 3. Setup execution environment ONLY if match is true
    - name: Set up Java 17
      if: steps.check_msg.outputs.match == 'true'
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      if: steps.check_msg.outputs.match == 'true'
      uses: android-actions/setup-android@v3

    - name: Make Gradle executable
      if: steps.check_msg.outputs.match == 'true'
      run: chmod +x gradlew

    # 4. Build application binary
    - name: Build APK
      if: steps.check_msg.outputs.match == 'true'
      run: ./gradlew assemble

    # 5. Create the formal GitHub Release asset
    - name: Create GitHub Release
      if: steps.check_msg.outputs.match == 'true'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v-${{ github.run_number }}"
        name: "Release #${{ github.run_number }}"
        body: "Automated production build asset."
        files: app/build/outputs/apk/**/*.apk

