name: Build Android APK

# Restrict the trigger to ONLY run if the commit message matches exactly
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    # Double validation: Checks the first line of the latest commit message explicitly
    if: ${{ github.event.head_commit.message == 'release' || github.event.pull_request.title == 'release' }}

    steps:
    - name: Checkout source code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make Gradle executable
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assemble

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: "v-${{ github.run_number }}"
        name: "Release #${{ github.run_number }}"
        body: "Automated production build."
        files: app/build/outputs/apk/**/*.apk

